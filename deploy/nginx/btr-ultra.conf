limit_req_zone $binary_remote_addr zone=btr_ultra:10m rate=10r/s;

# HTTPS vhost for BTR Ultra race-prep static site.
# Listens on :7443. Reuses the existing nip.io Let's Encrypt cert that the
# AA Bali vhost already owns. Port 80 for this hostname is already handled
# by /etc/nginx/sites-enabled/aabali.conf — don't duplicate it here.
server {
    listen 7443 ssl http2;
    server_name 103.6.170.102.nip.io;

    root /var/www/btr-ultra;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/103.6.170.102.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/103.6.170.102.nip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/xml text/xml image/svg+xml application/json application/gpx+xml;
    gzip_min_length 1024;

    location / {
        limit_req zone=btr_ultra burst=20 nodelay;
        limit_req_status 429;
        try_files $uri $uri.html $uri/ =404;
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(gpx|json)$ {
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location ~* \.(svg|ico|png|jpg|jpeg|gif|woff2?)$ {
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }
}
